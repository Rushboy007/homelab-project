name: Homelab
options:
  bundleIdPrefix: com.cipnas
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""

targets:
  Homelab:
    type: application
    platform: iOS
    sources:
      - path: Homelab
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cipnas.homelab
        INFOPLIST_FILE: Homelab/Info.plist
        CODE_SIGN_ENTITLEMENTS: Homelab/Homelab.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  HomelabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomelabTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Homelab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cipnas.homelab.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Homelab.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Homelab"
        BUNDLE_LOADER: "$(TEST_HOST)"
